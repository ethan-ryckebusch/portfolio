<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Vidéos Curieux ! Live</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --accent: #1FEF9A; --bg: #080c10; --surface: rgba(255,255,255,0.04); --text: #f1f1f1; --muted: #888; }
  body {
    background: var(--bg); color: var(--text); min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card {
    background: var(--surface); border: 1px solid rgba(31,239,154,0.15); border-radius: 20px;
    padding: 40px; width: 100%; max-width: 440px;
  }
  h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
  .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 28px; line-height: 1.6; }
  label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; margin-top: 16px; }
  input {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 0.92rem;
  }
  input:focus { outline: none; border-color: rgba(31,239,154,0.5); }
  button {
    cursor: pointer; border: none; border-radius: 50px; font-weight: 600; font-size: 0.9rem;
    padding: 13px 22px; transition: transform 0.15s ease, box-shadow 0.2s ease;
  }
  button:active { transform: scale(0.97); }
  .btn-solid { background: linear-gradient(135deg, #1FEF9A, #17c97d); color: #080c10; }
  .btn-solid:hover { box-shadow: 0 8px 24px rgba(31,239,154,0.3); }
  .btn-ghost { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid rgba(255,255,255,0.12); }
  .row { display: flex; gap: 10px; margin-top: 22px; }
  .msg { font-size: 0.82rem; margin-top: 14px; line-height: 1.5; }
  .msg.err { color: #ff6b6b; }
  .msg.ok { color: var(--accent); }
  #panel { display: none; width: 100%; max-width: 720px; }
  .panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .video-list { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; max-height: 50vh; overflow-y: auto; }
  .video-row {
    display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 8px 12px;
    cursor: grab; transition: border-color 0.2s, opacity 0.2s;
  }
  .video-row.dragging { opacity: 0.4; }
  .video-row.drag-over { border-color: rgba(31,239,154,0.5); }
  .video-row .handle { color: var(--muted); font-size: 1rem; flex-shrink: 0; }
  .video-row img { width: 64px; height: 48px; object-fit: cover; border-radius: 6px; flex-shrink: 0; pointer-events: none; }
  .video-row .id { font-size: 0.8rem; color: var(--muted); flex: 1; word-break: break-all; }
  .video-row .pending {
    background: rgba(255,200,60,0.12); color: #ffc83c; border: 1px solid rgba(255,200,60,0.3);
    border-radius: 50px; padding: 3px 10px; font-size: 0.7rem; flex-shrink: 0;
  }
  .video-row .del {
    background: rgba(255,80,80,0.12); color: #ff6b6b; border: 1px solid rgba(255,80,80,0.25);
    border-radius: 50px; padding: 6px 12px; font-size: 0.78rem;
  }
  .add-row { display: flex; gap: 10px; }
  .add-row input { flex: 1; }
  a { color: var(--accent); }
</style>
</head>
<body>

  <div class="card" id="login">
    <h1>Panneau admin</h1>
    <p class="sub">Gère les vidéos de la modale « Curieux ! Live ». Colle ton jeton d'accès GitHub pour te connecter.</p>
    <label>Jeton d'accès GitHub (Personal Access Token)</label>
    <input type="password" id="token" placeholder="github_pat_...">
    <div class="row">
      <button class="btn-solid" onclick="login()" style="flex:1">Se connecter</button>
    </div>
    <p class="msg" id="loginMsg"></p>
    <p class="sub" style="margin-top:24px;font-size:0.76rem;">
      Pas encore de jeton ? <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">Crée-en un ici</a>
    </p>
  </div>

  <div class="card" id="panel">
    <div class="panel-head">
      <h1 style="margin:0;">Vidéos — Curieux ! Live</h1>
      <button class="btn-ghost" onclick="logout()">Se déconnecter</button>
    </div>
    <div class="video-list" id="videoList"></div>
    <div class="add-row">
      <input id="newVideo" placeholder="Colle un lien YouTube (ou l'ID)" onkeydown="if(event.key==='Enter'){event.preventDefault();addVideo();}">
      <button class="btn-ghost" onclick="addVideo()">Ajouter</button>
    </div>
    <div class="row">
      <button class="btn-solid" onclick="save()" style="flex:1">Enregistrer</button>
    </div>
    <p class="msg" id="panelMsg"></p>
  </div>

<script>
const REPO = 'ethan-ryckebusch/portfolio';
const FILE_PATH = 'videos.json';
const API = `https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`;

let videos = [];
let savedVideos = [];
let titles = {};
let sha = null;
let dragIndex = null;

function getToken() { return localStorage.getItem('gh_token'); }

function extractId(input) {
  input = input.trim();
  const patterns = [
    /(?:youtu\.be\/|youtube\.com\/(?:shorts\/|embed\/|live\/|watch\?v=))([a-zA-Z0-9_-]{11})/
  ];
  for (const p of patterns) {
    const m = input.match(p);
    if (m) return m[1];
  }
  // bare ID: only accepted after live verification against YouTube (see addVideo)
  if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
  return null;
}

async function fetchYoutubeInfo(id) {
  try {
    const res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);
    if (!res.ok) return null;
    return await res.json();
  } catch (e) {
    return null;
  }
}

async function login() {
  const token = document.getElementById('token').value.trim();
  const msg = document.getElementById('loginMsg');
  if (!token) { msg.className = 'msg err'; msg.textContent = 'Colle ton jeton.'; return; }
  msg.className = 'msg'; msg.textContent = 'Vérification…';
  try {
    const res = await fetch(API, { headers: { Authorization: `Bearer ${token}` } });
    if (res.status === 401 || res.status === 403) throw new Error('Jeton invalide ou permissions insuffisantes.');
    if (!res.ok && res.status !== 404) throw new Error('Erreur API GitHub (' + res.status + ').');
    localStorage.setItem('gh_token', token);
    if (res.status === 404) { videos = []; sha = null; }
    else {
      const data = await res.json();
      sha = data.sha;
      const decoded = decodeURIComponent(escape(atob(data.content)));
      videos = [...new Set(JSON.parse(decoded).videos || [])];
    }
    savedVideos = [...videos];
    document.getElementById('login').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    renderList();
    loadTitles();
  } catch (e) {
    msg.className = 'msg err';
    msg.textContent = e.message;
  }
}

function logout() {
  localStorage.removeItem('gh_token');
  document.getElementById('panel').style.display = 'none';
  document.getElementById('login').style.display = 'block';
  document.getElementById('token').value = '';
}

function renderList() {
  const list = document.getElementById('videoList');
  list.innerHTML = videos.map((id, i) => `
    <div class="video-row" draggable="true" data-index="${i}"
      ondragstart="onDragStart(event, ${i})" ondragover="onDragOver(event, ${i})"
      ondrop="onDrop(event, ${i})" ondragend="onDragEnd(event)" ondragleave="onDragLeave(event)">
      <span class="handle">⠿</span>
      <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" alt="">
      <span class="id">${titles[id] || id}</span>
      ${!savedVideos.includes(id) ? '<span class="pending">En attente</span>' : ''}
      <button class="del" onclick="removeVideo(${i})">Retirer</button>
    </div>
  `).join('') || '<p class="sub">Aucune vidéo pour l\'instant.</p>';
}

async function loadTitles() {
  const missing = videos.filter(id => !titles[id]);
  await Promise.all(missing.map(async id => {
    const info = await fetchYoutubeInfo(id);
    if (info && info.title) titles[id] = info.title;
  }));
  renderList();
}

function onDragStart(e, i) {
  dragIndex = i;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e, i) {
  e.preventDefault();
  if (i !== dragIndex) e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, i) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragIndex === null || dragIndex === i) return;
  const [moved] = videos.splice(dragIndex, 1);
  videos.splice(i, 0, moved);
  dragIndex = null;
  renderList();
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.video-row.drag-over').forEach(el => el.classList.remove('drag-over'));
}

async function addVideo() {
  const input = document.getElementById('newVideo');
  const addBtn = document.querySelector('.add-row button');
  const id = extractId(input.value);
  const msg = document.getElementById('panelMsg');
  if (!id) { msg.className = 'msg err'; msg.textContent = "Lien YouTube non reconnu."; return; }
  if (videos.includes(id)) { msg.className = 'msg err'; msg.textContent = "Cette vidéo est déjà dans la liste."; return; }
  msg.className = 'msg'; msg.textContent = 'Vérification sur YouTube…';
  addBtn.disabled = true;
  const info = await fetchYoutubeInfo(id);
  addBtn.disabled = false;
  if (!info) { msg.className = 'msg err'; msg.textContent = "Cette vidéo n'existe pas ou n'est pas publique sur YouTube."; return; }
  if (info.title) titles[id] = info.title;
  videos.unshift(id);
  input.value = '';
  msg.textContent = '';
  renderList();
}

function removeVideo(i) {
  videos.splice(i, 1);
  renderList();
}

async function save() {
  const token = getToken();
  const msg = document.getElementById('panelMsg');
  msg.className = 'msg'; msg.textContent = 'Enregistrement…';
  try {
    videos = [...new Set(videos)];
    renderList();
    const content = btoa(unescape(encodeURIComponent(JSON.stringify({ videos }, null, 2))));
    const body = {
      message: 'Mise à jour des vidéos Curieux ! Live',
      content,
      ...(sha ? { sha } : {})
    };
    const res = await fetch(API, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('Échec de l\'enregistrement (' + res.status + ').');
    const data = await res.json();
    sha = data.content.sha;
    savedVideos = [...videos];
    renderList();
    msg.className = 'msg ok';
    msg.textContent = 'Enregistré ! Le site affichera les changements dans une minute ou deux (le temps que GitHub Pages republie).';
  } catch (e) {
    msg.className = 'msg err';
    msg.textContent = e.message;
  }
}

(function init() {
  const token = getToken();
  if (token) {
    document.getElementById('token').value = token;
    login();
  }
})();
</script>
</body>
</html>
